<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Style Framework | Documentation</title>
  <link rel="stylesheet" href="./docs/docs.scss">
</head>
<body class="ml-app-shell">
  <aside class="ml-sidebar">
    <div class="mu-p-md">
      <strong class="mu-text-brand">M-SYSTEM</strong>
    </div>
    <nav class="mc-nav">
      <a href="#setup" class="mc-nav__link">Instalación</a>
      <a href="#buttons" class="mc-nav__link">Buttons</a>
      <a href="#cards" class="mc-nav__link">Cards</a>
    </nav>
  </aside>

  <main class="ml-main">
    <header class="mu-py-xl">
      <h1 class="mu-text-display">Documentación</h1>
      <p>Explora los componentes de M-System bajo OKLCH.</p>
      
      <div class="mu-flex mu-gap-md mu-mt-lg">
        <button id="themeToggle" class="mc-btn mc-btn--secondary">
        🌙 Modo Oscuro
        </button>
      </div>
    </header>

    <section id="buttons" class="mu-mb-xl">
      <h2 class="mu-mb-md">Componente: Botón</h2>
      <div class="mc-card">
        <button class="mc-btn">Botón Primario</button>
        <button class="mc-btn mc-btn--secondary">Botón Secundario</button>
      </div>
    </section>
  </main>

  <script type="module">
    // Aquí podrías añadir lógica para persistir el tema en localStorage
    const root = document.documentElement;
    const btn = document.getElementById('themeToggle');

    btn.addEventListener('click', () => {
        const isDark = root.getAttribute('data-theme') === 'dark';

        if (isDark) {
        root.setAttribute('data-theme', 'light');
        btn.innerHTML = '🌙 Modo Oscuro';
        } else {
        root.setAttribute('data-theme', 'dark');
        btn.innerHTML = '☀️ Modo Claro';
        }
    });
  </script>
</body>
</html>
